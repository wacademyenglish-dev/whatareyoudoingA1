<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | What are you doing? (A1)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        void: '#121212',
                        panel: '#181818',
                        sysGreen: '#1DB954',
                        sysRed: '#E22134',
                        textMuted: '#b3b3b3'
                    },
                    fontFamily: {
                        title: ['Inter', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace']
                    },
                    boxShadow: {
                        'neon-green': '0 0 20px rgba(29, 185, 84, 0.4)',
                        'neon-red': '0 0 20px rgba(226, 33, 52, 0.5)'
                    }
                }
            }
        }
    </script>

    <style>
        /* CORE WOLF LABS AESTHETIC */
        body { 
            background-color: #121212; 
            color: #ffffff; 
            overflow-x: hidden; 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(29, 185, 84, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.02) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .hud-panel {
            background: rgba(24, 24, 24, 0.85);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .game-card {
            background: rgba(30, 30, 30, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            position: relative; border-radius: 12px; transition: all 0.3s ease;
        }
        .game-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: #1DB954; opacity: 0.8; border-radius: 12px 0 0 12px;
        }

        /* Chips for Warmups */
        .chip-btn {
            transition: all 0.2s ease;
            user-select: none;
        }

        /* JIT Vocab Word */
        .jit-word {
            position: relative; display: inline-block; cursor: pointer;
            color: #1DB954; font-weight: 800; border-bottom: 2px dashed #1DB954;
            transition: all 0.2s ease; padding-bottom: 2px;
        }
        .jit-word:hover { color: #fff; text-shadow: 0 0 15px #1DB954; background: rgba(29, 185, 84, 0.15); }
        .jit-word.active { background: #1DB954; color: #121212; border-bottom: none; border-radius: 4px; padding: 2px 6px; }

        /* Drills & Buttons */
        .combat-btn { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); border-radius: 8px;}
        .combat-btn:hover:not(:disabled) { background: rgba(29, 185, 84, 0.1); border-color: #1DB954; transform: translateY(-2px); box-shadow: 0 0 15px rgba(29, 185, 84, 0.2); }
        .combat-btn.correct { background: rgba(29, 185, 84, 0.2); color: #1DB954; font-weight: bold; border-color: #1DB954; box-shadow: 0 0 20px rgba(29, 185, 84, 0.4); }
        .combat-btn.wrong { background: rgba(226, 33, 52, 0.2); color: #E22134; border-color: #E22134; opacity: 0.6; }

        /* MECHANICS VISUALS */
        .bug-word { cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.2s; border: 1px solid transparent; display: inline-block; margin: 0 2px; font-weight: 600;}
        .bug-word:hover:not(.locked) { background: rgba(29, 185, 84, 0.2); border-color: #1DB954; }
        .bug-word.bug-found { background: rgba(226, 33, 52, 0.4); border-color: #E22134; color: #fff; text-decoration: line-through; }
        .bug-word.bug-wrong { background: rgba(255, 255, 255, 0.1); opacity: 0.5; }
        
        .build-word { cursor: pointer; transition: all 0.2s; border-radius: 8px; }
        .build-word:hover { transform: scale(1.05); box-shadow: 0 0 10px rgba(29, 185, 84, 0.3); }
        .build-slot { min-height: 60px; border: 2px dashed rgba(29, 185, 84, 0.3); transition: all 0.3s; border-radius: 12px; }
        .build-slot.complete-correct { border-style: solid; border-color: #1DB954; background: rgba(29, 185, 84, 0.1); }
        .build-slot.complete-wrong { border-style: solid; border-color: #E22134; background: rgba(226, 33, 52, 0.1); }

        .auth-valid:hover:not(:disabled) { background: rgba(29, 185, 84, 0.1); border-color: #1DB954; box-shadow: 0 0 15px rgba(29, 185, 84, 0.3); }
        .auth-corrupt:hover:not(:disabled) { background: rgba(226, 33, 52, 0.1); border-color: #E22134; box-shadow: 0 0 15px rgba(226, 33, 52, 0.3); }

        .timer-track { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
        .timer-fill { height: 100%; background: #1DB954; width: 100%; }
        .timer-anim { animation: shrinkBar 8s linear forwards; }
        @keyframes shrinkBar { 0% { width: 100%; background: #1DB954; } 50% { background: #FBBF24; } 100% { width: 0%; background: #E22134; } }

        .slot-btn { font-family: 'Inter', sans-serif; font-size: 1.5rem; font-weight: 700; background: #121212; border: 2px solid #1DB954; color: #1DB954; transition: all 0.1s; user-select: none; border-radius: 8px;}
        .slot-btn:active { transform: scale(0.95); }
        .slot-btn.locked { background: #1DB954; color: #121212; pointer-events: none; }

        .stt-box { background: linear-gradient(90deg, rgba(29, 185, 84, 0.1) 0%, rgba(0,0,0,0) 100%); border-left: 4px solid #1DB954; border-radius: 0 8px 8px 0; }
        .drawer { transition: transform 0.4s cubic-bezier(0.77, 0, 0.175, 1); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
        .damage-flash { animation: shake 0.4s; box-shadow: inset 0 0 60px rgba(226, 33, 52, 0.3) !important; border-color: #E22134 !important; }
        .xp-flash { box-shadow: inset 0 0 60px rgba(29, 185, 84, 0.2) !important; border-color: #1DB954 !important; }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 24px; width: 24px;
            background: #1DB954; cursor: pointer; margin-top: -10px;
            box-shadow: 0 0 15px rgba(29, 185, 84, 0.6); border-radius: 50%;
        }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #1DB954; border-radius: 3px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-body antialiased flex flex-col h-screen overflow-hidden selection:bg-sysGreen selection:text-void">

        </div>
        <div id="map-nodes" class="p-4 flex flex-col gap-2 overflow-y-auto scrollbar-hide"></div>
    </div>

    <!-- BOTTOM NAV -->
    <footer class="fixed bottom-0 w-full z-50 hud-panel border-t border-white/10 px-6 py-4 flex justify-between items-center">

        function playNarrative(nodeId) {
            const container = document.getElementById('narrative-gameplay');
            const node = narrativeNodes[nodeId];

            if (node.isEnd) {
                container.innerHTML = `
                    <div class="text-center fade-in flex flex-col h-full justify-center">

                            <p class="text-xl text-white italic font-body">"${node.stt}"</p>
                        </div>
                    </div>
                `;
                if(node.action) node.action();
            } else {
                let buttonsHTML = node.choices.map(c => `
                    <button onclick="playNarrative('${c.next}')" class="flex flex-col items-center justify-center p-8 border border-white/10 bg-panel hover:bg-white/5 hover:border-white transition-all group gap-6 rounded-xl w-full">
                        <div class="text-center mt-auto">

                    </button>
                `).join('');

                container.innerHTML = `

                        <p class="font-body text-2xl md:text-3xl text-white mb-12 leading-relaxed border-l-4 border-white pl-8">${node.text}</p>

        }

        // --- ENGINE LOGIC ---

        function startTimer(drillNum, seconds) {
            if(activeTimer) clearTimeout(activeTimer);
            let bar = document.getElementById('timer-bar-' + drillNum);
            let btn1 = document.getElementById('btn' + drillNum + '-1');
            let btn2 = document.getElementById('btn' + drillNum + '-2');
            
            if(bar) {
                bar.style.animation = 'none';
                void bar.offsetWidth;
                bar.classList.add('timer-anim');
            }
            
            activeTimer = setTimeout(() => {
                if(btn1 && !btn1.disabled) {
                    takeDamage(20);
                    let drillDiv = document.getElementById('drill-' + drillNum);
                    drillDiv.classList.add('damage-flash');
                    setTimeout(() => drillDiv.classList.remove('damage-flash'), 400);
                    
                    btn1.disabled = true; btn2.disabled = true;
                    btn1.style.opacity = '0.3'; btn2.style.opacity = '0.3';
                    
                    let fb = document.getElementById('fb-' + drillNum);
                    if(fb) {
                        fb.classList.remove('hidden');
                        fb.querySelector('p').innerText = "TIME IS UP";
                        fb.querySelector('p').classList.replace('text-sysGreen', 'text-sysRed');
                    }
                }
            }, seconds * 1000);
        }

        function checkTimeAttack(btn, isCorrect, num) {
            if(activeTimer) clearTimeout(activeTimer);
            let bar = document.getElementById('timer-bar-' + num);
            if(bar) { bar.style.animationPlayState = 'paused'; }
            
            const btns = btn.parentElement.querySelectorAll('button');
            btns.forEach(b => { b.disabled = true; if(b !== btn) b.style.opacity = '0.3'; });
            
            if (isCorrect) {
                btn.classList.add('correct');
                gainXP(30);
                document.getElementById(`drill-${num}`).classList.add('xp-flash');
                setTimeout(() => document.getElementById(`drill-${num}`).classList.remove('xp-flash'), 500);
                document.getElementById(`fb-${num}`).classList.remove('hidden');
            } else {
                btn.classList.add('wrong');
                takeDamage(20);
                setTimeout(() => {
                    btns.forEach(b => { if(!b.classList.contains('wrong')){ b.disabled = false; b.style.opacity = '1'; } });
                    if(bar) bar.style.animationPlayState = 'running';
                }, 600);
            }
        }

        function checkAuth(btn, isValidSyntax, num) {
            const btns = btn.parentElement.querySelectorAll('button');
            btns.forEach(b => { b.disabled = true; if(b !== btn) b.style.opacity = '0.3'; });

            if (isValidSyntax) {
                btn.classList.add('correct'); 
                btn.style.background = btn.classList.contains('auth-valid') ? 'rgba(29, 185, 84, 0.2)' : 'rgba(226, 33, 52, 0.2)';
                gainXP(20);
                document.getElementById(`drill-${num}`).classList.add('xp-flash');
                setTimeout(() => document.getElementById(`drill-${num}`).classList.remove('xp-flash'), 500);
                document.getElementById(`fb-${num}`).classList.remove('hidden');
            } else {
                btn.classList.add('wrong');
                takeDamage(15);
                setTimeout(() => {
                    btns.forEach(b => { if(!b.classList.contains('wrong')){ b.disabled = false; b.style.opacity = '1'; } });
                }, 600);
            }
        }

        function initBuilder(num, wordsArray) {
            builtSentences[num] = [];
            let bank = document.getElementById('bank-' + num);
            let zone = document.getElementById('build-zone-' + num);
            let checkBtn = document.getElementById('btn-check-' + num);
            
            zone.innerHTML = '';
            checkBtn.classList.add('opacity-50', 'pointer-events-none');

            wordsArray.sort(() => Math.random() - 0.5);
            
            bank.innerHTML = wordsArray.map((w, i) => 
                `<button id="word-${num}-${i}" onclick="addToBuilder('${w}', ${num}, this.id)" class="build-word bg-panel border border-white/20 text-white px-4 py-2 font-mono shadow-[0_0_10px_rgba(255,255,255,0.1)]">${w}</button>`
            ).join('');
        }

        function addToBuilder(word, num, btnId) {
            builtSentences[num].push(word);
            document.getElementById(btnId).style.visibility = 'hidden';
            
            let zone = document.getElementById('build-zone-' + num);
            let newBtn = document.createElement('button');
            newBtn.className = "bg-white text-black px-4 py-2 rounded-lg font-mono font-bold";
            newBtn.innerText = word;
            newBtn.onclick = function() {
                let idx = builtSentences[num].lastIndexOf(word);
                if(idx > -1) builtSentences[num].splice(idx, 1);
                zone.removeChild(this);
                document.getElementById(btnId).style.visibility = 'visible';
                
                document.getElementById('btn-check-' + num).classList.add('opacity-50', 'pointer-events-none');
                zone.classList.remove('complete-correct', 'complete-wrong');
            };
            
            zone.appendChild(newBtn);

            let bankTotal = document.getElementById('bank-' + num).children.length;
            if(builtSentences[num].length === bankTotal) {
                document.getElementById('btn-check-' + num).classList.remove('opacity-50', 'pointer-events-none');
            }
        }

        function checkBuilder(num, correctSentence) {
            let currentSentence = builtSentences[num].join(" ");
            let zone = document.getElementById('build-zone-' + num);
            
            if(currentSentence === correctSentence) {
                zone.classList.add('complete-correct');
                zone.classList.remove('complete-wrong');
                gainXP(40);
                document.getElementById(`drill-${num}`).classList.add('xp-flash');
                setTimeout(() => document.getElementById(`drill-${num}`).classList.remove('xp-flash'), 500);
                document.getElementById(`fb-${num}`).classList.remove('hidden');
                
                Array.from(zone.children).forEach(c => c.onclick = null);
                document.getElementById('btn-check-' + num).style.display = 'none';
            } else {
                zone.classList.add('complete-wrong');
                takeDamage(15);
                let drillDiv = document.getElementById(`drill-${num}`);
                drillDiv.classList.add('damage-flash');
                setTimeout(() => {
                    drillDiv.classList.remove('damage-flash');
                    zone.classList.remove('complete-wrong');
                }, 500);
            }
        }

        let slotData = {};
        function cycleSlot(btnId, arrayWords) {
            if(!slotData[btnId]) slotData[btnId] = 0;
            slotData[btnId]++;
            if(slotData[btnId] >= arrayWords.length) slotData[btnId] = 0;
            document.getElementById(btnId).innerText = arrayWords[slotData[btnId]];
        }

        function checkSlot(btnId, correctWord, num) {
            let btn = document.getElementById(btnId);
            if(btn.innerText === correctWord) {
                btn.classList.add('locked');
                document.getElementById('lock-' + num).style.display = 'none';
                gainXP(20);
                document.getElementById(`drill-${num}`).classList.add('xp-flash');
                setTimeout(() => document.getElementById(`drill-${num}`).classList.remove('xp-flash'), 500);
                document.getElementById(`fb-${num}`).classList.remove('hidden');
            } else {
                takeDamage(15);
                let drillDiv = document.getElementById(`drill-${num}`);
                drillDiv.classList.add('damage-flash');
                setTimeout(() => drillDiv.classList.remove('damage-flash'), 500);
            }
        }

        function checkBug(el, isBug, num) {
            if(el.parentElement.classList.contains('locked')) return;

            if(isBug) {
                el.classList.add('bug-found');
                el.parentElement.classList.add('locked');
                
                Array.from(el.parentElement.children).forEach(child => {
                    if(child !== el) child.classList.add('bug-wrong');
                });

                gainXP(30);
                document.getElementById(`drill-${num}`).classList.add('xp-flash');
                setTimeout(() => document.getElementById(`drill-${num}`).classList.remove('xp-flash'), 500);
                document.getElementById(`fb-${num}`).classList.remove('hidden');
            } else {
                takeDamage(10);
                let drillDiv = document.getElementById(`drill-${num}`);
                drillDiv.classList.add('damage-flash');
                setTimeout(() => drillDiv.classList.remove('damage-flash'), 400);
            }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        function updateHUD() {
            document.getElementById('hp-text').innerText = state.hp;
            document.getElementById('hp-bar').style.width = state.hp + "%";
            document.getElementById('xp-text').innerText = state.xp;
        }

        function takeDamage(amount) {
            state.hp = Math.max(0, state.hp - amount);
            updateHUD();
            document.body.classList.add('damage-flash');
            setTimeout(() => document.body.classList.remove('damage-flash'), 400);
            if (state.hp <= 0) { 
                alert("OUT OF FOCUS. Please restart the lesson."); 
                location.reload(); 
            }
        }

        function gainXP(amount) { state.xp += amount; updateHUD(); }

        function renderMap() {
            const container = document.getElementById('map-nodes');
            container.innerHTML = lessonData.map((step, i) => {
                let color = i === state.current ? 'text-sysGreen font-bold' : (i < state.current ? 'text-white' : 'text-gray-500');
                return `
                <div class="flex items-center justify-between p-3 rounded cursor-pointer hover:bg-white/5 transition-colors" onclick="jumpTo(${i})">
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-mono w-4 text-right ${i === state.current ? 'text-sysGreen' : 'text-gray-500'}">${i + 1}</span>
                        <span class="text-sm font-body ${color}">${step.title}</span>
                    </div>
                    ${i === state.current ? '<i class="fa-solid fa-play text-sysGreen text-xs"></i>' : ''}
                </div>
            `}).join('');
        }

        function renderStep() {
            closeJIT();
            if(activeTimer) clearTimeout(activeTimer);
            const stage = document.getElementById('engine-stage');
            stage.innerHTML = lessonData[state.current].html;
            
            let displayNum = state.current + 1;
            document.getElementById('current-step-display').innerText = displayNum < 10 ? `0${displayNum}` : displayNum;
            document.getElementById('btn-prev').disabled = state.current === 0;
            document.getElementById('btn-next').disabled = state.current === lessonData.length - 1;
            
            if (lessonData[state.current].onLoad) lessonData[state.current].onLoad();
            renderMap();
            updateHUD();
        }

        function nextStep() { if (state.current < lessonData.length - 1) { state.current++; renderStep(); } }
        function prevStep() { if (state.current > 0) { state.current--; renderStep(); } }
        function jumpTo(idx) { state.current = idx; renderStep(); toggleDrawer('lesson-map'); }

        function toggleDrawer(id) {
            const drawers = ['lesson-map', 'jit-panel', 'tactical-board'];
            drawers.forEach(drawerId => {
                const drawer = document.getElementById(drawerId);
                if (!drawer) return;
                
                if (drawerId === id) {
                    if (drawer.classList.contains('translate-x-full') || drawer.classList.contains('-translate-x-full')) {
                        drawer.classList.remove('translate-x-full', '-translate-x-full');
                    } else {
                        if (id === 'lesson-map') drawer.classList.add('-translate-x-full');
                        else drawer.classList.add('translate-x-full');
                    }
                } else {
                    if (drawerId === 'lesson-map') drawer.classList.add('-translate-x-full');
                    else drawer.classList.add('translate-x-full');
                }
            });
        }

        function clearNotes() {
            document.getElementById('t-notes').value = '';
            document.getElementById('t-notes').focus();
        }

        function revealIntel(key, el = null) {
            const data = intelDB[key];
            if (!data) return;
            
            if (el) {
                document.querySelectorAll('.jit-word').forEach(r => r.classList.remove('active'));
                el.classList.add('active');
            }
            
            document.getElementById('jit-content').innerHTML = `
                <div class="flex flex-col items-center text-center mb-8 fade-in">
                    <span class="text-7xl mb-6 drop-shadow-lg">${data.emoji}</span>
                    <h2 class="font-title font-bold text-4xl text-white mb-2 drop-shadow-md">${data.title}</h2>
                    <span class="text-sysGreen font-mono text-xs uppercase tracking-widest">${data.type}</span>
                </div>
                <div class="mb-6 slide-up">
                    <p class="text-gray-400 text-xs uppercase font-mono tracking-widest mb-2">Meaning</p>
                    <p class="text-white text-xl font-body leading-relaxed">${data.meaning}</p>
                </div>
                <div class="bg-black/50 p-6 rounded-xl slide-up border-l-2 border-sysGreen" style="animation-delay: 0.1s">
                    <p class="text-sysGreen text-xs uppercase font-mono tracking-widest mb-2">Example Log</p>
                    <p class="text-white text-lg italic font-body">"${data.example}"</p>
                </div>
                ${data.followUp ? `
                <div class="stt-box p-6 mt-6 bg-white/5 rounded-xl shadow-lg slide-up border-l-white" style="animation-delay: 0.2s">
                    <span class="text-xs text-white uppercase font-mono tracking-widest mb-2 block">Audio Prompt:</span>
                    <p class="text-white text-base font-body italic">"${data.followUp}"</p>
                </div>
                ` : ''}
            `;
            document.getElementById('intel-panel').classList.remove('translate-x-full');
        }
        
        function closeJIT() { 
            document.getElementById('jit-panel').classList.add('translate-x-full'); 
            document.querySelectorAll('.jit-word').forEach(r => r.classList.remove('active'));
        }

        function checkCombat(btn, isCorrect, num) {
            const btns = btn.parentElement.querySelectorAll('.combat-btn');
            btns.forEach(b => { b.disabled = true; if(b !== btn) b.style.opacity = '0.3'; });
            
            if (isCorrect) {
                btn.classList.add('correct');
                gainXP(20);
                document.getElementById(`drill-${num}`).classList.add('xp-flash');
                setTimeout(() => document.getElementById(`drill-${num}`).classList.remove('xp-flash'), 500);
                document.getElementById(`fb-${num}`).classList.remove('hidden');
            } else {
                btn.classList.add('wrong');
                takeDamage(15);
                setTimeout(() => {
                    btns.forEach(b => { if(!b.classList.contains('wrong')){ b.disabled = false; b.style.opacity = '1'; } });
                }, 600);
            }
        }

        window.onload = renderStep;
    </script>
</body>
</html>
